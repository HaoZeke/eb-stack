<svg xmlns="http://www.w3.org/2000/svg" width="420" height="120" viewBox="0 0 420 120" fill="none" aria-labelledby="eb-stack-logo-title" role="img">
  <title id="eb-stack-logo-title">eb-stack — EasyBuild stack lock and toolchain bump</title>
  <desc>Logo for eb-stack: three stacked recipe cards with a lock pin, wordmark eb-stack.</desc>
  <!-- Mark: three stacked cards (easyconfigs) with a generation pin -->
  <g id="eb-stack-mark" transform="translate(8,14)">
    <!-- back card -->
    <rect x="18" y="8" width="72" height="48" rx="6" fill="#CCFBF1" stroke="#0F766E" stroke-width="2.5"/>
    <!-- middle card -->
    <rect x="10" y="22" width="72" height="48" rx="6" fill="#99F6E4" stroke="#0F766E" stroke-width="2.5"/>
    <!-- front card -->
    <rect x="2" y="36" width="72" height="48" rx="6" fill="#F8FAFC" stroke="#0F172A" stroke-width="2.5"/>
    <!-- dependency lines on front card -->
    <rect x="12" y="48" width="40" height="5" rx="1.5" fill="#0F766E"/>
    <rect x="12" y="58" width="52" height="5" rx="1.5" fill="#94A3B8"/>
    <rect x="12" y="68" width="34" height="5" rx="1.5" fill="#94A3B8"/>
    <!-- generation pin / lock -->
    <circle cx="78" cy="58" r="14" fill="#EA580C" stroke="#0F172A" stroke-width="2"/>
    <path d="M78 50 v8 M74 58 h8" stroke="#FFF7ED" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="72" y="58" width="12" height="10" rx="2" fill="#FFF7ED"/>
  </g>
  <!-- Wordmark -->
  <text x="120" y="78" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="800" letter-spacing="-1.5" fill="#0F172A">eb-stack</text>
</svg>
