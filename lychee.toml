# Link check for docs HTML and README.
# Offline-friendly defaults: skip local anchors and private hosts.

max_concurrency = 8
timeout = 20
accept = [200, 206, 429]

# Package, site, and repository URLs may 404 until each public surface is published.
# github.com/example is used only for structured artifact examples.
exclude = [
  '^https://crates\.io/',
  '^https://docs\.rs/',
  '^https://eb-stack\.rgoswami\.me/',
  '^https://github\.com/HaoZeke/eb-stack',
  '^https://github\.com/example/',
]

exclude_path = [
  'docs/build/_sources/',
]

# Local file links from Sphinx are fine.
include_verbatim = true
