schema_version = 1

[[targets]]
name = "site-builder"

[targets.transport]
kind = "ssh"
host = "builder.example.org"

[targets.executor]
kind = "slurm"
partition = "build"
cpus = 8
memory = "32G"
time = "02:00:00"

[targets.runtime]
kind = "podman"
image = "registry.example.org/easybuild:rocky9"
args = ["--security-opt", "label=disable", "--cap-add=NET_RAW"]
mounts = ["/shared:/shared"]
workdir = "/shared/eb-stack/campaigns"

# Compiled modules, build trees, and temporary files are scoped to the runtime
# ABI. Source archives may be shared across targets.
[targets.easybuild]
command = "eb"
robot_paths = ["/shared/easybuild/easyconfigs", "/shared/eb-stack/overlay"]
work_root = "/shared/eb-stack/targets/rocky9/campaigns"
tmp_root = "/shared/eb-stack/targets/rocky9/tmp"

[targets.easybuild.environment]
EASYBUILD_INSTALLPATH = "/shared/eb-stack/targets/rocky9/easybuild"
EASYBUILD_SOURCEPATH = "/shared/easybuild/sources"
# Rootless-Podman container builds run eb as container-root. These let real
# builds succeed inside the isolated container without disabling any check:
#  - EASYBUILD_ALLOW_USE_AS_ROOT... : eb itself refuses root without it.
#  - TAR_OPTIONS=--no-same-owner    : tar as root aborts on archives whose
#    packaged uid is outside the userns map (e.g. libfabric).
#  - PRTE/OMPI ALLOW_RUN_AS_ROOT... : OpenMPI 5.x sanity runs mpi_test via
#    mpirun; PRRTE refuses to launch as root without these (the sanity MPI
#    programs still run and must pass).
#  - OMPI_MCA_mpi_yield_when_idle / rmaps_base_oversubscribe : multi-rank test
#    suites (QMCPACK ctest) oversubscribe cores when the box runs a second
#    build. Without yield-on-idle, OpenMPI ranks busy-wait-spin in collectives
#    and deadlock (ctest never returns). Yielding lets every rank progress
#    under oversubscription so tests finish and pass instead of hanging.
EASYBUILD_ALLOW_USE_AS_ROOT_AND_ACCEPT_CONSEQUENCES = "1"
TAR_OPTIONS = "--no-same-owner"
PRTE_ALLOW_RUN_AS_ROOT = "1"
PRTE_ALLOW_RUN_AS_ROOT_CONFIRM = "1"
OMPI_ALLOW_RUN_AS_ROOT = "1"
OMPI_ALLOW_RUN_AS_ROOT_CONFIRM = "1"
OMPI_MCA_mpi_yield_when_idle = "1"
OMPI_MCA_rmaps_base_oversubscribe = "1"
