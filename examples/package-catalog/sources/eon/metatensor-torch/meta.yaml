{% set version = "0.10.0" %}
{% set url_base = "https://github.com/lab-cosmo/metatensor/releases/download" %}

package:
  name: libmetatensor-torch
  version: {{ version }}

source:
  url: {{ url_base }}/metatensor-torch-v{{ version }}/metatensor-torch-cxx-{{ version }}.tar.gz
  sha256: a0a25e061ae4fbf2a563e9fcceed68ac79b4d857e4c9803a1614d301dc3fdfcd

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('libmetatensor-torch', max_pin='x.x') }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - cmake
    - ninja
  host:
    - libmetatensor >=0.2.2,<0.3
    - libtorch * cpu*
    - libtorch

test:
  requires:
    - cmake
    - ninja
    - {{ compiler('cxx') }}
    - libtorch * cpu*
  commands:
    - test -f $PREFIX/lib/libmetatensor_torch$SHLIB_EXT

about:
  home: https://github.com/metatensor/metatensor
  summary: TorchScript and C++ bindings to metatensor
  license: BSD-3-Clause
  license_file: LICENSE
  doc_url: https://docs.metatensor.org
