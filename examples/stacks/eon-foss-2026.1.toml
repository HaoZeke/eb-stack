schema_version = 1
name = "eon-foss-2026.1"

[toolchain]
name = "foss"
version = "2026.1"

# eOn's complete product consumes identities that are not in the foss-2026.1
# hierarchy. Preferred mode admits each pinned artifact and its closure into
# Resolvo while retaining a recorded fallback when another candidate is the
# only jointly feasible selection.
[[pins]]
name = "PyTorch"
version_requirement = "==2.9.1"
toolchain = { name = "foss", version = "2024a" }
versionsuffix = ""
mode = "preferred"
source = "eOn/EESSI compatibility stack"

