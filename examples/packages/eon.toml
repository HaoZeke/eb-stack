schema_version = 1

[package]
name = "eOn"
homepage = "https://eondocs.org/"
description = "eOn models the evolution of atomic-scale systems over long time scales."
license = "BSD-3-Clause"

[build]
easyblock = "MesonNinja"
build_systems = ["Meson", "Ninja"]
source_root = "%(name)s-%(version)s"
moduleclass = "chem"

[[build.patches]]
filename = "eOn-2.16.0_safemath-eigen5-core-guard.patch"
sha256 = "fccc4ceb74f2ec7b225142071fcc2dde07f89df637f1aa0e57404831e650a59c"
source = "patches/eon/eOn-2.16.0_safemath-eigen5-core-guard.patch"

[build.easyconfig_parameters]
sanity_check_commands = [
  "eonclient --help",
  "eonclient --version",
  "python -c \"import eon; print(getattr(eon, '__version__', 'ok'))\"",
]
modextrapaths = { PYTHONPATH = "lib/python%(pyshortver)s/site-packages" }

[build.easyconfig_parameters.sanity_check_paths]
files = [
  "bin/eonclient",
  "lib/python%(pyshortver)s/site-packages/eon/__init__.py",
]
dirs = [
  "bin",
  "lib",
  "lib/python%(pyshortver)s/site-packages/eon",
]

[dependencies]
exclude_from_solve = [
  "libtorch",
  "pytorch",
  "PyTorch",
  "libmetatensor",
  "libmetatensor-torch",
  "libmetatomic-torch",
  "metatensor",
  "metatensor-torch",
  "metatomic-torch",
  "xtb",
  "vesin",
]

[dependencies.aliases]
libreadcon-core = "readcon-core"

[[dependencies.requirements]]
name = "Meson"
constraint = ">=1.8"
roles = ["build"]

[[dependencies.requirements]]
name = "Ninja"
roles = ["build"]

[[dependencies.requirements]]
name = "pkgconf"
roles = ["build"]

[[dependencies.requirements]]
name = "CMake"
roles = ["build"]

[[dependencies.requirements]]
name = "Python"

[[dependencies.requirements]]
name = "SciPy-bundle"

[[dependencies.requirements]]
name = "PyYAML"

[[dependencies.requirements]]
name = "Eigen"
constraint = "==5.0.0"

[[dependencies.requirements]]
name = "Highway"

[[dependencies.requirements]]
name = "inih"

[[dependencies.requirements]]
name = "quill"


[[dependencies.requirements]]
name = "readcon-core"
constraint = "==0.13.1"

[[dependencies.requirements]]
name = "rgpot"
constraint = "==2.5.0"

[[profiles]]
name = "default"
default = true
config_options = [
  "--wrap-mode=nodownload",
  "-Dbuildtype=release",
  "-Dwith_tests=false",
  "-Dwith_rgpot=true",
]
verification_commands = [
  { program = "bash", args = ["-lc", "module load {module} && eonclient --help && eonclient --version"] },
  { program = "bash", args = ["-lc", "module load {module} && python -c 'import eon'"] },
]

[profiles.features]
metatomic = false
xtb = false
serve = false
rgpot = true
mpi = false

[profiles.toolchain_options]
openmp = true
pic = true
