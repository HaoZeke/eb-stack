# The EasyBuild LAMMPS easyblock builds the bundled Kokkos source selected by
# the profile; a standalone Kokkos module is not a direct recipe dependency.
[dependencies]
exclude_from_solve = ["kokkos"]

# These are requirements of the EasyBuild product policy. Existing foreign
# edges merge with them; absent edges enter the manifest, SBOM, and Resolvo.
[[dependencies.requirements]]
name = "CMake"
roles = ["build"]

[[dependencies.requirements]]
name = "pkgconf"
roles = ["build"]

[[dependencies.requirements]]
name = "archspec"
roles = ["build"]

[[dependencies.requirements]]
name = "PyYAML"
roles = ["build"]

[[dependencies.requirements]]
name = "Python"

[[dependencies.requirements]]
name = "libpng"

[[dependencies.requirements]]
name = "libjpeg-turbo"

[[dependencies.requirements]]
name = "netCDF"

[[dependencies.requirements]]
name = "GSL"

[[dependencies.requirements]]
name = "zlib"

[[dependencies.requirements]]
name = "gzip"

[[dependencies.requirements]]
name = "cURL"

[[dependencies.requirements]]
name = "HDF5"

[[dependencies.requirements]]
name = "PCRE"

[[dependencies.requirements]]
name = "libxml2"

[[dependencies.requirements]]
name = "FFmpeg"

[[dependencies.requirements]]
name = "Voro++"

[[dependencies.requirements]]
name = "kim-api"

[[dependencies.requirements]]
name = "Eigen"

[[dependencies.requirements]]
name = "PLUMED"

[[dependencies.requirements]]
name = "SciPy-bundle"

[[dependencies.requirements]]
name = "VTK"

[[dependencies.requirements]]
name = "MDI"

[[dependencies.requirements]]
name = "mpi4py"

[[dependencies.requirements]]
name = "tbb"

[[dependencies.requirements]]
name = "ScaFaCoS"

[[profiles]]
name = "default"
default = true
versionsuffix = ["-kokkos"]
config_options = []
verification_commands = [
  { program = "bash", args = ["-lc", "module load {module} && lmp -help >/dev/null"] },
]

[profiles.features]
mpi = true
openmp = true
kokkos = true
kspace = true
python = true

# Conda build-string selectors use a valued MPI provider rather than a boolean
# feature. This value activates their MPI dependency branches.
[profiles.parameters]
mpi = "openmpi"

[profiles.toolchain_options]
usempi = true
openmp = true
