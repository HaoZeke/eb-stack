schema_version = 1

[package]
name = "LAMMPS"
version = "22Jul2025_update4"
homepage = "https://www.lammps.org/"
license = "GPL-2.0-only"
description = """LAMMPS is a classical molecular dynamics simulator for
atomic, mesoscopic, and continuum systems."""

[build]
easyblock = "auto"
build_systems = ["CMake"]
config_options = [
  "-DCMAKE_CXX_STANDARD=17",
  "-DCMAKE_CXX_STANDARD_REQUIRED=on",
]
moduleclass = "chem"
patches = []

# The EasyBuild LAMMPS easyblock builds the bundled Kokkos source selected by
# the profile; a standalone Kokkos module is not a direct recipe dependency.
[dependencies]
exclude_from_solve = ["kokkos"]

[[profiles]]
name = "default"
default = true
versionsuffix = ["-kokkos"]
config_options = []
verification_commands = [
  { program = "bash", args = ["-lc", "module load {module} && lmp -help >/dev/null"] },
]

[profiles.features]
mpi = true
openmp = true
kokkos = true
kspace = true
python = true

# Conda build-string selectors use a valued MPI provider rather than a boolean
# feature. This value activates their MPI dependency branches.
[profiles.parameters]
mpi = "openmpi"

[profiles.toolchain_options]
usempi = true
openmp = true
