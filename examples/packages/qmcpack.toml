schema_version = 1

[package]
name = "QMCPACK"
homepage = "https://qmcpack.org"
description = "QMCPACK is an open-source quantum Monte Carlo simulation code."
license = "NCSA"

[build]
easyblock = "CMakeNinja"
build_systems = ["CMake", "Ninja"]
moduleclass = "chem"

[build.easyconfig_parameters]
start_dir = "%(namelower)s-%(version)s"
test_cmd = "ctest"
testopts = "-L deterministic -j %(parallel)s --output-on-failure -E 'unit_test_message-r12|unit_test_new_drivers_mpi-r16'"
sanity_check_commands = [
  "qmcpack --version 2>&1 | grep -q 'QMCPACK version'",
]

[build.easyconfig_parameters.sanity_check_paths]
files = [
  "bin/qmcpack",
  "bin/convert4qmc",
  "bin/ppconvert",
  "bin/qmcpack.settings",
]
dirs = ["lib/nexus"]

[build.easyconfig_parameters.modextrapaths]
PYTHONPATH = "lib"

[[dependencies.requirements]]
name = "Ninja"
roles = ["build"]

[[dependencies.requirements]]
name = "pkgconf"
roles = ["build"]

[[dependencies.requirements]]
name = "Boost"
roles = ["run"]

[[profiles]]
name = "default"
default = true
config_options = [
  "-DCMAKE_BUILD_TYPE=Release",
  "-DQMC_MPI=ON",
  "-DQMC_OMP=ON",
  "-DQMC_MIXED_PRECISION=OFF",
  "-DQMC_COMPLEX=OFF",
  "-DBUILD_AFQMC=OFF",
]
verification_commands = [
  { program = "bash", args = ["-lc", "module load {module} && qmcpack --version 2>&1 | grep -q 'QMCPACK version'"] },
]

[profiles.features]
mpi = true
complex = false
mixed = false

[profiles.toolchain_options]
usempi = true
openmp = true

[[profiles]]
name = "complex"
inherits = "default"
versionsuffix = ["-complex"]
config_options = [
  "-DCMAKE_BUILD_TYPE=Release",
  "-DQMC_MPI=ON",
  "-DQMC_OMP=ON",
  "-DQMC_MIXED_PRECISION=OFF",
  "-DQMC_COMPLEX=ON",
  "-DBUILD_AFQMC=OFF",
]

[profiles.features]
complex = true
