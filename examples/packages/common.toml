schema_version = 1

# EasyBuild targets are Linux systems. This context resolves foreign platform
# selectors during manifest materialization; package layers can refine it.
[[profiles]]
name = "default"
platform = "linux"

# Cross-ecosystem names that cannot be derived by case and punctuation
# normalization. Sites can layer another package config after this file.
[dependencies]
exclude_from_solve = [
  "_openmp_mutex",
  "cargo-bundle-licenses",
  "libgcc-ng",
  "libstdcxx-ng",
  "sccache",
  "sysroot_linux-64",
]

[dependencies.aliases]
python = "Python"
pip = { provider = "Python", constraint = "drop" }
setuptools = { provider = "Python", constraint = "drop" }
"py-pip" = { provider = "Python", constraint = "drop" }
"py-wheel" = { provider = "Python", constraint = "drop" }
"py-setuptools" = { provider = "Python", constraint = "drop" }
"py-build" = "build"
cmake = "CMake"
ninja = "Ninja"
meson = "Meson"
"pkg-config" = "pkgconf"
boost = "Boost"
hdf5 = "HDF5"
eigen = "Eigen"
highway = "Highway"
libinih = "inih"
gmake = "make"
capnproto = "CapnProto"
"py-pyyaml" = "PyYAML"
pyyaml = "PyYAML"
"py-numpy" = { provider = "SciPy-bundle", constraint = "drop" }
numpy = { provider = "SciPy-bundle", constraint = "drop" }
"py-scipy" = { provider = "SciPy-bundle", constraint = "drop" }
"py-matplotlib" = "matplotlib"
libtorch = "PyTorch"
pytorch = "PyTorch"
libmetatensor = "metatensor"
"libmetatensor-torch" = "metatensor-torch"
"libmetatomic-torch" = "metatomic-torch"
"py-mpi4py" = "mpi4py"
"voro-plus-plus" = "Voro++"
voro = "Voro++"
libnetcdf = "netCDF"
libpnetcdf = "PnetCDF"
libcurl = "cURL"

[dependencies.virtuals]
mpi = "mpi"
libblas = "blas"
libcblas = "blas"
liblapack = "lapack"
liblapacke = "lapack"
