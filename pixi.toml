[workspace]
channels = ["conda-forge"]
name = "eb-stack"
platforms = ["linux-64"]
version = "0.3.0"

[dependencies]

[feature.docs.dependencies]
python = ">=3.12,<4"
emacs = ">=30.2,<31"
graphviz = ">=12,<13"

[feature.docs.pypi-dependencies]
shibuya = ">=2025.12.13, <2026"
sphinx = ">=9.0.4, <10"
sphinx-sitemap = ">=2.9.0, <3"
sphinx-copybutton = ">=0.5.2, <1"
sphinx-design = ">=0.6.0, <1"

[feature.docs.tasks]
mkrst = { cmd = "emacs --batch --load export.el", cwd = "docs" }
# Rust API: host-cargo sphinx-rustdocgen keeps native linking outside the pixi environment.
gen-rust-api = { cmd = "bash scripts/gen-rust-api.sh", description = "Generate docs/source/crates/eb_stack via sphinx-rustdocgen" }
sphinxbld = { cmd = "bash scripts/sphinx-build-docs.sh", depends-on = ["mkrst", "gen-rust-api"] }
docbld = { depends-on = ["sphinxbld"] }
docdel = { cmd = "rm -rf build source/*.rst source/**/*.rst source/crates 2>/dev/null; true", cwd = "docs" }
linkcheck = { cmd = "lychee --config lychee.toml --no-progress 'docs/build/**/*.html' README.md" }

[environments]
docs = { features = ["docs"] }
