name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: format, clippy, and public metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Rust formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Public metadata contract
        run: cargo test --locked --test public_metadata
      - name: Cargo source package
        run: cargo package --locked

  msrv:
    name: Rust 1.88 minimum
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Locked all-targets check
        run: cargo check --locked --all-targets

  unit:
    name: cargo test --lib
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Library unit tests
        run: cargo test --locked --lib

  known-bumps:
    name: known-bump regression (reproduce_real_prs + bump_emit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Replay frozen maintainer toolchain bumps
        run: |
          set -euo pipefail
          # Library + CLI emit path: foss-2023b -> foss-2024a pairs under
          # tests/repro_fixtures/ (GROMACS, ScaFaCoS, MDTraj, Fiona, PuLP, numba)
          # plus hierarchy-aware Resolvo cases in bump_emit.
          cargo test --locked --test reproduce_real_prs --test bump_emit -- --nocapture

  packaging-fixtures:
    name: packaging fixtures (eOn + QMCPACK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Parse, resolve, packaging_gate on frozen PR recipe sets
        run: |
          set -euo pipefail
          # Robot-overlay checks skip cleanly when no easyconfigs tree is
          # present; resolve + packaging_gate always run against the fixtures.
          cargo test --locked \
            --test eon_foss_2026_1 \
            --test qmcpack_foss_2026_1 \
            --test eon_packaging \
            --test goal_scenario \
            -- --nocapture

  solve-reports:
    name: solve + build-list + stack-diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Co-select and report fixtures
        run: cargo test --locked --test build_list_and_stack_diff -- --nocapture

  canonical-workflows:
    name: canonical package + campaign workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Parse, materialize, solve, route, and coordinate campaigns
        run: |
          cargo test --locked \
            --test container_contract \
            --test foreign_conditions \
            --test foreign_ingest \
            --test foreign_package_plan \
            --test manifest_requires_resolvo \
            --test package_model \
            --test package_config \
            --test profile_emission \
            --test package_workflow \
            --test bump_workflow \
            --test stack_policy \
            --test canonical_cli \
            --test target_config \
            --test campaign \
            --test mcp_v1

  cli-smoke:
    name: CLI smoke (package bundle + recipe checks)
    runs-on: ubuntu-latest
    needs: [unit, known-bumps]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --locked --release --bin eb-stack
      - name: Tutorial path (GROMACS zero-hand-fed bump)
        run: |
          set -euo pipefail
          BIN=./target/release/eb-stack
          OUT=$(mktemp -d)
          "$BIN" --version
          "$BIN" package bump \
            --source tests/repro_fixtures/gromacs/GROMACS-2024.4-foss-2023b.eb \
            --toolchain-name foss \
            --toolchain-version 2024a \
            --easyconfigs tests/repro_fixtures/universe_foss_2024a \
            --out-dir "$OUT"
          RECIPE="$OUT/easyconfigs/g/GROMACS/GROMACS-2024.4-foss-2024a.eb"
          test -f "$OUT/package.plan.json"
          test -f "$OUT/package.sbom.cdx.json"
          test -f "$OUT/locks/default.lock.json"
          test -f "$RECIPE"
          grep -q "toolchain = {'name': 'foss', 'version': '2024a'}" \
            "$RECIPE"
          grep -q "('Python', '3.12.3')" "$RECIPE"
          grep -q "('mpi4py', '4.0.1')" "$RECIPE"
          # Residual: maintainer-added pybind11 is NOT invented.
          ! grep -q pybind11 "$RECIPE"
      - name: recipe check on QMCPACK fixture (universe = empty drafts)
        run: |
          set -euo pipefail
          BIN=./target/release/eb-stack
          # Fixture alone lacks HDF5/Boost; expect non-zero (loud incompleteness).
          if "$BIN" recipe check \
            --recipe fixtures/qmcpack_foss_2026_1/easyconfigs/q/QMCPACK/QMCPACK-4.3.0-foss-2026.1.eb \
            --easyconfigs fixtures/qmcpack_foss_2026_1/easyconfigs; then
            echo "expected recipe check to fail without robot deps" >&2
            exit 1
          fi
      - name: recipe packaging gate on eOn regression fixture
        run: |
          set -euo pipefail
          BIN=./target/release/eb-stack
          # Drafts alone leave stack deps missing; exit non-zero is correct.
          # Still exercises parse + packaging_gate on the regression recipe.
          if "$BIN" recipe check \
            --recipe fixtures/eon_foss_2026_1/easyconfigs/e/eOn/eOn-2.16.0-foss-2026.1.eb \
            --easyconfigs fixtures/eon_foss_2026_1/easyconfigs \
            --require-configopt=-Dwith_metatomic=true \
            --require-configopt=-Dwith_xtb=true \
            --require-configopt=-Dwith_serve=true \
            --require-configopt=-Dwith_rgpot=true; then
            echo "expected recipe check to fail without robot deps" >&2
            exit 1
          fi
