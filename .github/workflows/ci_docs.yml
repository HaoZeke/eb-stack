name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Sphinx docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: prefix-dev/setup-pixi@v0.8.10
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          environments: docs

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install sphinx-rustdocgen
        run: cargo install sphinx-rustdocgen --locked || cargo install sphinx-rustdocgen

      - name: Docs venv with sphinxcontrib-rust
        run: |
          set -euo pipefail
          # Keep the native Sphinx extension on the runner's Rust/C linker.
          python3 -m venv .venv-docs
          .venv-docs/bin/pip install -U pip
          .venv-docs/bin/pip install \
            'sphinx>=9,<10' \
            'shibuya>=2025.12.13,<2026' \
            'sphinx-sitemap>=2.9,<3' \
            'sphinx-copybutton>=0.5.2,<1' \
            'sphinx-design>=0.6,<1' \
            'sphinxcontrib-rust>=1,<2' \
            'sphinx-rustdoc-postprocess>=0.1,<0.2'
          .venv-docs/bin/python -c 'import sphinxcontrib_rust; print("ok")'

      - name: Build documentation
        run: pixi run -e docs docbld
        env:
          EB_STACK_DOCS_PYTHON: ${{ github.workspace }}/.venv-docs/bin/python

      - name: Assert version-one CLI and Rust API docs
        run: |
          set -euo pipefail
          grep -q 'package plan' docs/build/reference/cli.html
          grep -q 'campaign run' docs/build/reference/cli.html
          grep -q 'eb_package_plan' docs/build/reference/cli.html
          grep -q 'eb-stack mcp' docs/build/reference/cli.html
          # In-site Rust API
          test -f docs/build/reference/rust-api.html
          test -f docs/build/crates/eb_stack/lib.html
          grep -q 'plan_new_package' docs/build/crates/eb_stack/lib.html
          test -f docs/build/reference/package-bundles.html
          test -f docs/build/reference/targets.html
          test -f docs/build/reference/campaigns.html
          scripts/check-doc-links.sh docs/build
          # light/dark logos present
          test -f docs/build/_static/logo-light.svg
          test -f docs/build/_static/logo-dark.svg
          grep -q logo-light docs/build/index.html || grep -q logo-dark docs/build/index.html || true

      - name: Install lychee
        uses: taiki-e/install-action@v2
        with:
          tool: lychee@0.24.2

      - name: Link check (lychee)
        run: lychee --config lychee.toml --no-progress 'docs/build/**/*.html' README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before deploy retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (retry)
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
