name: Pre-checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: prek-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prek:
    name: prek
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Run prek
        run: uvx prek run -a
